name: install-smoke

on:
  push:
    branches:
      - main
      - feat/**
      - fix/**
  pull_request:

jobs:
  # F2 regression guard: `plamen install` must complete cleanly without a
  # controlling terminal. Claude Code's Bash tool, Codex shells, and CI all
  # run with stdin redirected from /dev/null. The wizard's InquirerPy picker
  # crashes there with `OSError: [Errno 22]`; install must NOT touch it.
  non-tty-install:
    name: non-TTY install (${{ matrix.os }} / py${{ matrix.python }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python: ["3.11", "3.12"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - name: Syntax check plamen.py + scripts/
        run: |
          python -m py_compile plamen.py
          python -m py_compile scripts/codex_adapter.py
      - name: plamen --help (banner + dispatch)
        # If main()'s argument parsing or banner breaks, fail loud.
        run: python plamen.py help
      - name: plamen install (non-TTY, stdin closed)
        # The whole point of F2: pipe nothing into stdin, redirect both
        # stdio streams, and assert exit 0 + no inquirer crash.
        shell: bash
        run: |
          python plamen.py install < /dev/null
      - name: plamen install --codex (non-TTY)
        # F1 regression guard: Codex adapter generator must not NameError
        # on undefined f-string placeholders.
        shell: bash
        run: |
          python plamen.py install --codex < /dev/null
      - name: plamen install (idempotent re-run)
        shell: bash
        run: |
          python plamen.py install < /dev/null
      - name: Verify rename — codex/ absent, codex-adapter/ present
        # F6 regression guard.
        shell: bash
        run: |
          test ! -e codex
          test -d codex-adapter
      - name: Verify python3 shim landed (Windows only)
        # python3.exe shim regression guard. The Python installer for
        # Windows creates python.exe but not python3.exe, so LLM-typed
        # `python3 ...` falls through to the Microsoft Store App
        # Execution Alias stub. `_ensure_python3_shim_windows` should
        # have copied python.exe → python3.exe in the same dir.
        if: runner.os == 'Windows'
        shell: bash
        run: |
          set -e
          PYEXE=$(python -c "import sys; print(sys.executable)")
          PYDIR=$(dirname "$PYEXE")
          # Either tier 1 (python3.exe next to python.exe) OR tier 2
          # (python3.bat in PLAMEN_HOME / repo root) must exist.
          if [ -f "$PYDIR/python3.exe" ]; then
            echo "OK: tier-1 shim at $PYDIR/python3.exe"
          elif [ -f "./python3.bat" ]; then
            echo "OK: tier-2 fallback shim at ./python3.bat"
          else
            echo "FAIL: no python3 shim found"
            echo "  expected: $PYDIR/python3.exe OR ./python3.bat"
            ls -la "$PYDIR" | head -20
            exit 1
          fi
          # Confirm `python3` actually runs and returns a real interpreter
          # path — not the Microsoft Store stub. Stub output contains
          # "Python was not found; run without arguments to install
          # from the Microsoft Store".
          OUT=$(python3 -c "import sys; print(sys.executable)" 2>&1)
          echo "python3 -> $OUT"
          case "$OUT" in
            *"WindowsApps"*|*"Microsoft Store"*|*"not found"*)
              echo "FAIL: python3 still resolves to the Store stub"
              exit 1
              ;;
          esac
      - name: Verify wizards + docs use python3 (no bare `python` for the driver)
        # Regression guard. Exit code 127 ("command not found") was hit on
        # Linux + macOS because wizards hardcoded `python ~/.claude/scripts/
        # plamen_driver.py` while POSIX defaults to `python3`. The bare
        # `python` form only works on Windows (and on POSIX distros that
        # installed the `python-is-python3` shim, which is not default).
        shell: bash
        run: |
          set -e
          BAD=$(grep -rnE 'python ~/(\.claude|\.plamen)/scripts/plamen_driver\.py' \
              commands/ docs/ rules/ README.md SETUP.md 2>&1 || true)
          # Filter out lines where `python` is preceded by `python3` (e.g.
          # `python3 ~/.claude/...`) — grep PCRE lookbehind isn't on every
          # runner, so do it as a second pass.
          BAD=$(echo "$BAD" | grep -v "python3 ~/" || true)
          if [ -n "$BAD" ]; then
            echo "FAIL: bare 'python' (not 'python3') invocations found in user-facing docs:"
            echo "$BAD"
            exit 1
          fi
          echo "OK: all driver invocations in docs use python3"

  unit-tests:
    name: pytest (${{ matrix.os }} / py${{ matrix.python }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python: ["3.11", "3.12"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - name: Install pytest
        # Use `python -m pip` form because plain `pip install --upgrade pip`
        # fails on Windows ("ERROR: To modify pip, please run...") — pip
        # cannot upgrade itself while it's the running entrypoint.
        run: python -m pip install --upgrade pip pytest
      - name: Install Plamen Python deps if requirements.txt exists
        shell: bash
        run: |
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
      - name: Run scripts/test_*.py
        # Collect-only first to catch import errors cheaply; then run the
        # full suite. Don't fail the whole pipeline if a test file imports
        # something only present in a deeper install — log it as a warning.
        shell: bash
        run: |
          set -e
          if compgen -G "scripts/test_*.py" > /dev/null; then
            pytest scripts/ --collect-only -q || echo "::warning::collect-only failed; check individual test files"
            pytest scripts/ -q --tb=short -x || echo "::warning::some tests failed; not a hard fail in smoke stage"
          else
            echo "No scripts/test_*.py — skipping"
          fi
